name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'option-1' \
            --exclude 'option-2' \
            --exclude 'option-3' \
            --exclude 'option-4' \
            --exclude 'option-5' \
            --exclude 'option-6' \
            --exclude 'index-local.html' \
            --exclude 'scripts' \
            --exclude 'requirements-sync.txt' \
            --exclude '__pycache__' \
            ./ _site/
          touch _site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          single-commit: true
